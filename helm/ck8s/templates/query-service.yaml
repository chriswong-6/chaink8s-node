apiVersion: v1
kind: Service
metadata:
  name: ck8s-query
  namespace: ck8s
spec:
  selector:
    app: ck8s-query
  type: {{ .Values.query.service.type }}
  ports:
    - name: http
      port: {{ .Values.query.port }}
      targetPort: http
      {{- if and (eq .Values.query.service.type "NodePort") .Values.query.service.nodePort }}
      nodePort: {{ .Values.query.service.nodePort }}
      {{- end }}
