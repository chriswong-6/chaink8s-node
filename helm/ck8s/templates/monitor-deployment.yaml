apiVersion: apps/v1
kind: Deployment
metadata:
  name: ck8s-monitor
  namespace: ck8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ck8s-monitor
  template:
    metadata:
      labels:
        app: ck8s-monitor
    spec:
      serviceAccountName: ck8s-monitor
      initContainers:
        - name: wait-akash-grpc
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z akash.ck8s.svc.cluster.local 9190; do
                echo "waiting for akash gRPC..."; sleep 3
              done
      containers:
        - name: monitor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - ck8s-monitor
            - --rpc=http://akash.ck8s.svc.cluster.local:26657
            - --grpc=akash.ck8s.svc.cluster.local:9190
            - --rest=http://akash.ck8s.svc.cluster.local:1317
            - --chain-id={{ .Values.akash.chainID }}
            - --provider={{ .Values.monitor.providerAddr }}
            - --node-id={{ .Values.monitor.nodeID }}
            {{- if .Values.monitor.k8sNodeName }}
            - --k8s-node={{ .Values.monitor.k8sNodeName }}
            {{- end }}
            - --key-name={{ .Values.monitor.keyName }}
            - --keyring-dir=/keyring
            - --keyring-backend={{ .Values.monitor.keyringBackend }}
            - --heartbeat={{ .Values.monitor.heartbeat }}
            - --namespace={{ .Values.monitor.podNamespace }}
            - --image={{ .Values.monitor.defaultImage }}
          volumeMounts:
            - name: keyring
              mountPath: /keyring
              readOnly: true
          resources: {{ toYaml .Values.monitor.resources | nindent 12 }}
      volumes:
        - name: keyring
          hostPath:
            path: {{ .Values.akash.hostDataPath }}
            type: Directory
