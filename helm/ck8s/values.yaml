image:
  repository: ghcr.io/chriswong-6/chaink8s-node
  tag: main
  pullPolicy: Always

# ── akash 链节点 ──────────────────────────────────────────────────────────────
akash:
  chainID: local-test
  # 宿主机上已初始化好的链数据目录，挂载进容器
  hostDataPath: /home/lmdrive/.akash-local
  resources: {}

# ── ck8s-monitor ──────────────────────────────────────────────────────────────
monitor:
  providerAddr: ""       # 必填：Provider bech32 地址
  nodeID: node-1
  k8sNodeName: ""        # kubectl get nodes 里的节点名；空则自动用 os.Hostname()
  keyName: mykey
  keyringBackend: test
  heartbeat: 30s
  podNamespace: default
  defaultImage: nginx:alpine
  resources: {}

# ── ck8s-query HTTP API ───────────────────────────────────────────────────────
query:
  port: 8080
  service:
    type: ClusterIP
    nodePort: ""
  resources: {}
